name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/quaiemissions
      QUAI_ZONE_RPC: https://rpc.quai.network/cyprus1
      NEXT_PUBLIC_QUAI_ZONE: cyprus1
      NEXT_PUBLIC_ROLLUPS_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
